<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Arquivos | BrSupply Help Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
    </style>
</head>
<body>
<div id="app">
    <header class="top-bar">
        <a href="index.html" class="logo">
            <div class="logo-main"><span class="br">Br</span><span class="supply">SUPPLY</span></div>
            <div class="logo-sub">Suprimentos Corporativos</div>
        </a>
        <div class="top-bar-divider"></div>
        <div class="page-title-bar">
            <i class="fa-solid fa-folder-open"></i> Repositório de Arquivos TI
        </div>
        <div class="top-bar-actions">
            <div class="user-profile-circle">AD</div>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="listachamados.html" class="nav-item"><i class="fa-solid fa-ticket"></i> Meus Chamados</a>
            <a href="listachamadosatendimento.html" class="nav-item"><i class="fa-solid fa-microchip"></i> Painel de Atendimento</a>
            <a href="arquivos.html" class="nav-item active"><i class="fa-solid fa-folder-open"></i> Arquivos</a>
            <a href="listatodoschamados.html" class="nav-item"><i class="fa-solid fa-chart-simple"></i> Relatórios</a>
        </div>
    </nav>

    <div class="content-area">
        <div class="card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h3><i class="fa-solid fa-list-check"></i> Lista de Arquivos da TI</h3>
                <div class="page-actions-top">
                    <button class="btn btn-secondary" onclick="renderFileList()" style="background:#0ea5e9; color:white;"><i class="fa-solid fa-arrows-rotate"></i> Atualizar</button>
                    <button class="btn btn-secondary" onclick="window.history.back()" style="background:#0ea5e9; color:white;"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
                </div>
            </div>
            
            <div class="card-body" style="padding: 0;">
                <div class="upload-section">
                    <button class="upload-btn" onclick="showToast('Selecione o arquivo para upload...', 'info')">
                        <i class="fa-solid fa-file-arrow-up"></i> Upload de Arquivo
                    </button>
                </div>

                <div class="table-filter-bar">
                    <div class="table-search-box">
                        <label>Procurar:</label>
                        <input type="text" id="file-search" class="input-modern" style="flex:1; max-width: 400px;" placeholder="Filtrar por nome, categoria ou tópico..." oninput="handleSearch()">
                    </div>

                    <div class="pagination-controls">
                        <button class="btn-pg">Primeira</button>
                        <button class="btn-pg">Anterior</button>
                        <button class="btn-pg">Seguinte</button>
                        <button class="btn-pg">Última</button>
                        <span>Página <input type="text" value="1" class="pg-input"> de 1</span>
                    </div>
                </div>

                <div class="table-container">
                    <table class="modern-table" id="repo-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th>Tópico</th>
                                <th>Data Upload</th>
                                <th class="al-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderFileList();
    });

    function renderFileList(filteredData = null) {
        const container = document.getElementById('file-list-body');
        if (!container) return;

        const files = filteredData || DB.getArquivos();

        if (files.length === 0) {
            container.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#64748b;">Nenhum arquivo encontrado.</td></tr>';
            return;
        }

        container.innerHTML = files.map(f => {
            const dt = new Date(f.dataUpload).toLocaleDateString('pt-BR');
            return `
            <tr>
                <td style="font-weight:600; color:#3b82f6;">${f.nome}</td>
                <td>${f.descricao}</td>
                <td style="font-size:0.85rem; font-weight:500;">${f.categoria}</td>
                <td style="font-size:0.85rem; color:#64748b;">${f.topico}</td>
                <td style="font-size:0.85rem;">${dt}</td>
                <td class="al-center">
                    <div style="display:flex; gap:6px; justify-content:center;">
                        <button class="btn-action-sm btn-edit" onclick="showToast('Editar não disponível neste mock.', 'info')">Editar</button>
                        <button class="btn-action-sm btn-dl" onclick="showToast('Iniciando download...', 'success')">Download</button>
                        <button class="btn-action-sm btn-rm" onclick="removeFile(${f.id})">Remover</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    function handleSearch() {
        const term = document.getElementById('file-search').value.toLowerCase();
        const allFiles = DB.getArquivos();
        const filtered = allFiles.filter(f => 
            f.nome.toLowerCase().includes(term) ||
            f.descricao.toLowerCase().includes(term) ||
            f.categoria.toLowerCase().includes(term) ||
            f.topico.toLowerCase().includes(term)
        );
        renderFileList(filtered);
    }

    function removeFile(id) {
        if (!confirm('Deseja realmente remover este arquivo?')) return;
        DB.deleteArquivo(id);
        showToast('Arquivo removido com sucesso!', 'success');
        renderFileList();
    }
</script>
</body>
</html>
